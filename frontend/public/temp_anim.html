<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Record Animation</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #030712; }
    .container { position: relative; width: 800px; height: 600px; margin: 0 auto; top: 50vh; transform: translateY(-50%); }
    .bg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
  </style>
</head>
<body>
  <div class="container">
    <img src="split_bg.png" class="bg" />
    <canvas id="anim" class="canvas"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('anim');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    const particles = [];
    const numParticles = 180;
    
    const resetParticle = (p, initialScatter = false) => {
      p.x = canvas.width / 2;
      p.y = canvas.height / 2;
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 1.5 + 0.2;
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      p.size = Math.random() * 2 + 1.5;
      
      if (initialScatter) {
        const offset = Math.random() * (canvas.width / 1.5);
        p.x += Math.cos(angle) * offset;
        p.y += Math.sin(angle) * offset;
      }
    };

    for (let i = 0; i < numParticles; i++) {
      const p = {};
      resetParticle(p, true);
      particles.push(p);
    }

    const pulses = [];

    const animate = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) {
          resetParticle(p, false);
        }
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        
        const isRightSide = p.x > canvas.width / 2;
        ctx.fillStyle = isRightSide ? 'rgba(249, 115, 22, 0.9)' : 'rgba(56, 189, 248, 0.9)'; 
        ctx.fill();
      });

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          
          if (dist < 100) {
            const isRightSide = particles[i].x > canvas.width / 2;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            
            const alpha = 0.3 - dist/100 * 0.3;
            ctx.strokeStyle = isRightSide 
              ? `rgba(249, 115, 22, ${alpha})`
              : `rgba(56, 189, 248, ${alpha})`;
            ctx.stroke();

            if (Math.random() < 0.002) {
               pulses.push({
                 p1: particles[i], p2: particles[j], progress: 0, 
                 speed: Math.random() * 0.03 + 0.01,
                 color: isRightSide ? '#F97316' : '#38BDF8'
               });
            }
          }
        }
      }

      for (let i = pulses.length - 1; i >= 0; i--) {
        let pulse = pulses[i];
        pulse.progress += pulse.speed;
        if (pulse.progress >= 1) {
          pulses.splice(i, 1);
          continue;
        }
        let px = pulse.p1.x + (pulse.p2.x - pulse.p1.x) * pulse.progress;
        let py = pulse.p1.y + (pulse.p2.y - pulse.p1.y) * pulse.progress;
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fillStyle = pulse.color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = pulse.color;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      requestAnimationFrame(animate);
    };

    animate();
  </script>
</body>
</html>
